<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voz de Cristo</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕊️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f5c842;
            --gold2: #ffdf80;
            --deep: #0a0a1a;
            --blue-dark: #0d1b4b;
            --blue-mid: #1a2f7a;
            --white: #fff;
            --soft: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--deep);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ── FONDO ANIMADO ── */
        .bg {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #1a2f7a 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, #3b1f6b 0%, transparent 55%),
                        radial-gradient(ellipse at 60% 80%, #0d1b4b 0%, transparent 60%),
                        #060614;
        }

        /* Partículas flotantes */
        .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--gold);
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Rayos de luz */
        .light-ray {
            position: fixed;
            width: 2px;
            height: 70vh;
            background: linear-gradient(to bottom, transparent, rgba(245,200,66,0.12), transparent);
            animation: rayPulse ease-in-out infinite alternate;
            z-index: 1;
        }
        @keyframes rayPulse { from { opacity: 0.3; } to { opacity: 1; } }

        /* ── CONTENEDOR ── */
        .wrapper {
            position: relative; z-index: 10;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 30px 20px;
        }

        /* ── LOGO / HEADER ── */
        .hero {
            text-align: center;
            margin-bottom: 10px;
            animation: fadeDown 0.8s ease both;
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .dove-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }
        .dove-img {
            width: 110px; height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            box-shadow: 0 0 30px rgba(245,200,66,0.5), 0 0 60px rgba(245,200,66,0.2);
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(245,200,66,0.5), 0 0 60px rgba(245,200,66,0.2); }
            50%       { box-shadow: 0 0 50px rgba(245,200,66,0.9), 0 0 100px rgba(245,200,66,0.4); }
        }

        /* Fallback si no hay imagen */
        .dove-fallback {
            width: 110px; height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a2f7a, #3b1f6b);
            border: 3px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
            box-shadow: 0 0 30px rgba(245,200,66,0.5);
            animation: glowPulse 3s ease-in-out infinite;
        }

        .ring {
            position: absolute; inset: -8px;
            border-radius: 50%;
            border: 2px dashed rgba(245,200,66,0.4);
            animation: spin 12s linear infinite;
        }
        .ring2 {
            position: absolute; inset: -18px;
            border-radius: 50%;
            border: 1px dashed rgba(245,200,66,0.2);
            animation: spin 20s linear infinite reverse;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 900;
            background: linear-gradient(135deg, #f5c842 0%, #fff 50%, #f5c842 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-shadow: none;
            line-height: 1.2;
            animation: shimmer 3s linear infinite;
            background-size: 200%;
        }
        @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 0.95rem;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* ── CARD ── */
        .card {
            width: 100%; max-width: 470px;
            background: linear-gradient(145deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.04) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(245,200,66,0.25);
            border-radius: 28px;
            padding: 36px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: fadeUp 0.9s 0.2s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Separador decorativo */
        .divider {
            display: flex; align-items: center; gap: 10px;
            margin: 22px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(245,200,66,0.4), transparent);
        }
        .divider span { color: var(--gold); font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; white-space: nowrap; }

        /* ── CAMPOS ── */
        .field { margin-bottom: 20px; }
        .field label {
            display: block;
            font-weight: 700;
            font-size: 0.82rem;
            color: var(--gold2);
            margin-bottom: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .field input, .field textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.07);
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            outline: none;
        }
        .field input::placeholder, .field textarea::placeholder { color: rgba(255,255,255,0.3); }
        .field input:focus, .field textarea:focus {
            border-color: var(--gold);
            background: rgba(245,200,66,0.08);
            box-shadow: 0 0 0 3px rgba(245,200,66,0.15);
        }
        .field textarea { resize: none; rows: 3; }

        /* ── EMOJIS DE ESTADO ── */
        .mood-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 4px;
        }
        .mood-option { position: relative; }
        .mood-option input[type="radio"] { display: none; }
        .mood-option label {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px;
            padding: 14px 6px 10px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s;
            text-transform: none;
            letter-spacing: 0;
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            font-weight: 700;
        }
        .mood-option label .emoji {
            font-size: 2rem;
            transition: transform 0.3s;
            line-height: 1;
        }
        .mood-option label:hover {
            border-color: rgba(245,200,66,0.5);
            background: rgba(245,200,66,0.1);
            transform: translateY(-3px);
        }
        .mood-option label:hover .emoji { transform: scale(1.25) rotate(-5deg); }
        .mood-option input[type="radio"]:checked + label {
            background: linear-gradient(135deg, rgba(245,200,66,0.25), rgba(245,200,66,0.1));
            border-color: var(--gold);
            color: var(--gold2);
            box-shadow: 0 4px 20px rgba(245,200,66,0.25);
        }
        .mood-option input[type="radio"]:checked + label .emoji {
            transform: scale(1.3) rotate(-5deg);
            animation: bounce 0.4s ease;
        }
        @keyframes bounce {
            0%  { transform: scale(1); }
            50% { transform: scale(1.5) rotate(-10deg); }
            100%{ transform: scale(1.3) rotate(-5deg); }
        }

        /* ── BOTÓN ── */
        .btn-submit {
            width: 100%;
            margin-top: 26px;
            padding: 18px;
            background: linear-gradient(135deg, #f5c842 0%, #e5a800 100%);
            color: #0a0a1a;
            border: none;
            border-radius: 16px;
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 6px 30px rgba(245,200,66,0.4);
            position: relative;
            overflow: hidden;
        }
        .btn-submit::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            transition: left 0.5s;
        }
        .btn-submit:hover::before { left: 100%; }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(245,200,66,0.6);
        }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled {
            opacity: 0.7; cursor: not-allowed;
            transform: none;
        }

        /* ── MENSAJE ÉXITO ── */
        .success-msg {
            display: none;
            text-align: center;
            animation: popIn 0.5s ease;
            padding: 10px 0;
        }
        @keyframes popIn {
            0%   { opacity: 0; transform: scale(0.8); }
            70%  { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        .success-msg .big-emoji { font-size: 3.5rem; display: block; margin-bottom: 10px; }
        .success-msg h2 {
            font-family: 'Cinzel Decorative', serif;
            color: var(--gold);
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        .success-msg p { color: rgba(255,255,255,0.7); font-size: 0.95rem; line-height: 1.6; }

        /* ── FOOTER ── */
        .footer {
            margin-top: 20px;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.78rem;
            letter-spacing: 1px;
            animation: fadeUp 1s 0.5s ease both;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .card { padding: 28px 20px; }
            .mood-grid { gap: 7px; }
            .mood-option label { padding: 10px 4px 8px; font-size: 0.65rem; }
            .mood-option label .emoji { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

<!-- Fondo -->
<div class="bg"></div>
<div class="particles" id="particles"></div>

<!-- Rayos de luz decorativos -->
<div class="light-ray" style="left:15%;top:0;animation-duration:4s;"></div>
<div class="light-ray" style="left:50%;top:10%;animation-duration:6s;animation-delay:1s;"></div>
<div class="light-ray" style="right:18%;top:5%;animation-duration:5s;animation-delay:2s;"></div>

<div class="wrapper">

    <!-- Header -->
    <div class="hero">
        <div class="dove-wrap">
            <!-- COLOCA AQUÍ LA URL O RUTA DE TU IMAGEN -->
            <!-- Si tienes una imagen guardada, reemplaza el src. Si no tienes imagen, borra el img y descomenta el div.dove-fallback -->
            <img
                src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Holy_Spirit_as_Dove.jpg/220px-Holy_Spirit_as_Dove.jpg"
                alt="Voz de Cristo"
                class="dove-img"
                onerror="this.style.display='none'; document.getElementById('fallback').style.display='flex';"
            >
            <div class="dove-fallback" id="fallback" style="display:none;">🕊️</div>
            <div class="ring"></div>
            <div class="ring2"></div>
        </div>
        <div class="title">Voz de Cristo</div>
        <div class="subtitle">✦ Grupo Juvenil Católico ✦</div>
    </div>

    <!-- Card -->
    <div class="card">

        <div id="formSection">
            <div class="divider"><span>✦ Registro de Asistencia ✦</span></div>

            <form id="asistenciaForm">

                <div class="field">
                    <label>¿Cómo te llamas?</label>
                    <input type="text" name="nombre" placeholder="Tu nombre completo" required autocomplete="name">
                </div>

                <div class="field">
                    <label>¿Cómo te sientes hoy?</label>
                    <div class="mood-grid">
                        <div class="mood-option">
                            <input type="radio" name="sentimiento" id="m1" value="Bendecido" required>
                            <label for="m1"><span class="emoji">🙏</span>Bendecido</label>
                        </div>
                        <div class="mood-option">
                            <input type="radio" name="sentimiento" id="m2" value="Feliz">
                            <label for="m2"><span class="emoji">😊</span>Feliz</label>
                        </div>
                        <div class="mood-option">
                            <input type="radio" name="sentimiento" id="m3" value="Cansado">
                            <label for="m3"><span class="emoji">😴</span>Cansado</label>
                        </div>
                        <div class="mood-option">
                            <input type="radio" name="sentimiento" id="m4" value="Necesito oración">
                            <label for="m4"><span class="emoji">🥺</span>Oración</label>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label>¿Algo que quieras compartir?</label>
                    <textarea name="comentario" rows="3" placeholder="Un mensaje para el equipo... 💬"></textarea>
                </div>

                <button type="submit" class="btn-submit" id="btnEnviar">
                    ¡Presente! ✝️
                </button>

            </form>
        </div>

        <!-- Mensaje de éxito -->
        <div class="success-msg" id="successMsg">
            <span class="big-emoji">🎉</span>
            <h2>¡Registrado!</h2>
            <p>Dios te bendiga enormemente.<br>¡Qué alegría tenerte hoy aquí con nosotros!</p>
        </div>

    </div>

    <div class="footer">Voz de Cristo © 2025 — Con ❤️ para el grupo</div>

</div>

<script>
    // ── PARTÍCULAS ──
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
        p.style.animationDuration = (Math.random() * 12 + 8) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        // Algunas partículas son cruces pequeñas
        if (Math.random() > 0.7) {
            p.style.borderRadius = '0';
            p.innerHTML = '';
            p.style.background = 'transparent';
            p.style.width = '8px'; p.style.height = '8px';
            p.style.fontSize = '10px';
            p.style.color = 'rgba(245,200,66,0.5)';
            p.style.display = 'flex';
            p.style.alignItems = 'center';
            p.textContent = '✦';
        }
        container.appendChild(p);
    }

    // ── FORMULARIO ──
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzyedu13bmWb_ZnOSLGxxqr-7ixsuBKRVqK2CGNgrDKWpi28hXOl6QHPKl79MlIINE-2Q/exec';
    const form = document.getElementById('asistenciaForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.textContent = '⏳ Registrando...';

        fetch(scriptURL, { method: 'POST', body: new FormData(form) })
            .then(() => {
                document.getElementById('formSection').style.display = 'none';
                const msg = document.getElementById('successMsg');
                msg.style.display = 'block';
                form.reset();
            })
            .catch(() => {
                alert('Hubo un error al conectar. Inténtalo de nuevo.');
                btn.disabled = false;
                btn.textContent = '¡Presente! ✝️';
            });
    });
</script>
</body>
</html>
